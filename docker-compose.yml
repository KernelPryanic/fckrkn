services:
  xray:
    build: .
    container_name: xray
    restart: unless-stopped
    environment:
      - TZ=UTC
    ports:
      - "8443:8443"
      - "51820:51820/udp"
      - "8080:8080"
      - "8880:8880"
    volumes:
      - ./config.json:/etc/xray/config.json:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
